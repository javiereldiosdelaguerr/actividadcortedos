<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro</title>


<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg1:#0f2027;
  --bg2:#203a43;
  --bg3:#2c5364;
  --accent:#00c6ff;
  --accent2:#0072ff;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family: 'Inter', sans-serif; /* cambio */
  background: linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3));
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
}

.card{
  width:350px;
  padding:30px;
  border-radius:20px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  box-shadow: 0 15px 40px rgba(0,0,0,0.4);
  animation: fadeIn 0.8s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform: translateY(20px)}
  to{opacity:1; transform: translateY(0)}
}

h2{
  text-align:center;
  margin-bottom:20px;
  font-weight:600;
}

.input-group{
  margin-bottom:15px;
}

.input-group input{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  outline:none;
  background:rgba(255,255,255,0.15);
  color:#fff;
  transition:0.3s;
}

.input-group input::placeholder{
  color:#ccc;
}

.input-group input:focus{
  background:rgba(255,255,255,0.25);
  box-shadow:0 0 10px var(--accent);
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(45deg,var(--accent),var(--accent2));
  color:#fff;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
  box-shadow:0 5px 20px rgba(0,198,255,0.5);
}

.link{
  text-align:center;
  margin-top:15px;
}

.link a{
  color:#00c6ff;
  text-decoration:none;
}

.link a:hover{
  text-decoration:underline;
}

#mensaje{
  text-align:center;
  margin-top:10px;
  font-size:14px;
}

.loader{
  display:none;
  margin:10px auto;
  border:4px solid rgba(255,255,255,0.2);
  border-top:4px solid #fff;
  border-radius:50%;
  width:25px;
  height:25px;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  to{transform:rotate(360deg)}
}
</style>
</head>

<body>

<div class="card">

<h2>Crear cuenta</h2>

<div class="input-group">
  <input type="text" id="nombre" placeholder="Nombre">
</div>

<div class="input-group">
  <input type="text" id="apellido" placeholder="Apellido">
</div>

<div class="input-group">
  <input type="text" id="telefono" placeholder="Teléfono">
</div>

<div class="input-group">
  <input type="email" id="correo" placeholder="Correo electrónico">
</div>

<div class="input-group">
  <input type="password" id="contrasena" placeholder="Contraseña">
</div>

<button id="btn" onclick="registro()">Crear cuenta</button>

<div class="loader" id="loader"></div>

<div class="link">
  <p>¿Ya tienes cuenta? <a href="index.html">Iniciar sesión</a></p>
</div>

<p id="mensaje"></p>

</div>

<script>
function registro() {
    const btn = document.getElementById('btn');
    const loader = document.getElementById('loader');

    const nombre = document.getElementById('nombre').value;
    const apellido = document.getElementById('apellido').value;
    const telefono = document.getElementById('telefono').value;
    const correo = document.getElementById('correo').value;
    const contrasena = document.getElementById('contrasena').value;

    if (!nombre || !apellido || !telefono || !correo || !contrasena) {
        document.getElementById('mensaje').innerHTML = "Completa todos los campos";
        return;
    }

    btn.style.display = "none";
    loader.style.display = "block";

    fetch('http://127.0.0.1:3000/registro', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nombre, apellido, telefono, correo, contrasena })
    })
    .then(res => res.json())
    .then(data => {
        loader.style.display = "none";
        btn.style.display = "block";

        document.getElementById('mensaje').innerHTML = data.mensaje;
    });
}
</script>

</body>
</html>
